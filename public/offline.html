<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13151a" />
    <title>Maibach Convert offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0c0e12;
        color: #f1ece5;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(90% 70% at 50% 0%, rgba(60, 70, 90, 0.34), transparent 55%),
          linear-gradient(180deg, #1a1d23 0%, #13151a 42%, #0c0e12 100%);
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
      }

      img {
        width: 44px;
        height: auto;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        letter-spacing: 0;
        line-height: 1;
      }

      p {
        margin: 16px 0 0;
        color: #b0a89c;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/logo-mark-white.svg" alt="Maibach Systems" width="209" height="456" />
      <h1>Maibach Convert ist offline</h1>
      <p>Die App-Shell ist lokal zwischengespeichert. Lade die Seite erneut, sobald dein Gerät wieder verbunden ist.</p>
    </main>
  </body>
</html>
