<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="rgb(250, 250, 250)" />
    <title>Maibach Convert offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: rgb(250, 250, 250);
        color: rgb(0, 0, 0);
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: rgb(250, 250, 250);
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
        border-radius: 40px;
        background: rgb(255, 255, 255);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 24px 48px -16px rgba(0, 0, 0, 0.12);
      }

      img {
        width: 44px;
        height: auto;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        letter-spacing: 0;
        line-height: 1;
      }

      p {
        margin: 16px 0 0;
        color: rgba(0, 0, 0, 0.56);
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/logo-mark.svg" alt="Maibach Systems" width="209" height="456" />
      <h1>Maibach Convert ist offline</h1>
      <p>Die App-Shell ist lokal zwischengespeichert. Lade die Seite erneut, sobald dein Gerät wieder verbunden ist.</p>
    </main>
  </body>
</html>
